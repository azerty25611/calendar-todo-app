<!DOCTYPE html>
<html lang="jp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>簡単なカレンダー</title>
    <style>
        .calendar-title {
            font-family: Arial, sans-serif;
            font-size: 35px;
            color: rgb(51, 62, 219);
            margin-bottom: 10px;
            text-align: center;
            /*text-shadow: 2px 2px 0 #000, -2px 2px 0 #000, 2px -2px 0 #000, -2px -2px 0 #000; /* 검은색 2px 테두리 효과 */
            
        }
        h2{
            font-size: 20px;
            color: rgb(224, 72, 61);
            margin-bottom: 10px;
            text-align: center;
        }
    </style>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="calendar-container">
        <h1 class="calendar-title">カレンダーメモ帳 &#x1F4DD</h1>
        <h2>日程ごとに頑張りましょう！&#x1F604;</h2>
        <div class="calendar-header">
            <button id="prev-month">前へ</button>
            <h1 id="current-month"></h1>
            <button id="next-month">次へ</button>
        </div>
        <!-- 입력 영역 고정 -->
        <div class="todo-input-container">
            <input type="text" id="todo-input" placeholder="やることを入力してください...">
            <button id="add-todo">追加</button>
        </div>
        <div class="calendar-grid" id="calendar-grid">
            <!-- 달력 날짜들이 여기에 나타남 -->
        </div>
    </div>

    <!-- TODO 리스트 영역 -->
    <div id="todo-list-container" class="todo-list-container"></div>

    <!-- JS 연결 -->
    <script src="script.js"></script>
</body>
</html>
